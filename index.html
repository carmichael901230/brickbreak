<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arc Cascade</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="mainMenu" class="menu-screen">
        <div class="menu-card">
          <p class="menu-kicker">Vertical Arcade</p>
          <h1 class="menu-title">Arc Cascade</h1>
          <p class="menu-copy">Stack the angles, break the wall, survive one more round.</p>
          <button id="playButton" class="primary-button menu-play" type="button">Play</button>
        </div>
      </section>

      <section id="gameScreen" class="game-screen is-hidden">
        <header class="top-hud" id="topHud">
          <div class="hud-left">
            <button id="pauseButton" class="icon-button" type="button" aria-label="Pause">
              <span></span>
              <span></span>
            </button>
            <div class="score-block">
              <span class="hud-label">Best</span>
              <strong id="bestValue">0</strong>
            </div>
          </div>

          <div class="hud-center">
            <span class="hud-label">Round</span>
            <strong id="roundValue">1</strong>
          </div>
          <div class="hud-right"></div>
        </header>

        <section class="board-shell" id="boardShell">
          <button
            id="speedButton"
            class="speed-button is-hidden"
            type="button"
          >
            2x Speed
          </button>
          <canvas
            id="gameCanvas"
            width="720"
            height="960"
            aria-label="Arc Cascade game arena"
          ></canvas>
          <p id="statusText" class="status-text">Drag on the arena to aim. Release to fire.</p>
        </section>
      </section>
    </main>

    <div id="pauseOverlay" class="overlay is-hidden" aria-hidden="true">
      <div class="overlay-card">
        <h2>Paused</h2>
        <button id="resumeButton" class="primary-button" type="button">Resume</button>
        <button id="openSettingsButton" class="secondary-button" type="button">Settings</button>
        <button id="backToMenuButton" class="secondary-button" type="button">Main Menu</button>
      </div>
    </div>

    <div id="settingsOverlay" class="overlay is-hidden" aria-hidden="true">
      <div class="overlay-card">
        <h2>Settings</h2>
        <label class="sound-toggle">
          <input id="soundToggle" type="checkbox" />
          Sound Hooks
        </label>
        <button id="closeSettingsButton" class="primary-button" type="button">Done</button>
      </div>
    </div>

    <div id="gameOverOverlay" class="overlay is-hidden" aria-hidden="true">
      <div class="overlay-card">
        <h2>Run Over</h2>
        <p id="gameOverSummary" class="overlay-copy">You made it to round 1.</p>
        <button id="restartRunButton" class="primary-button" type="button">Restart</button>
        <button id="gameOverMenuButton" class="secondary-button" type="button">Main Menu</button>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
